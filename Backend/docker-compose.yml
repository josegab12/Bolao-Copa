services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolao
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
    ports:
      - "5432:5432"
    volumes:
      - bolao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bolao_postgres_data:
